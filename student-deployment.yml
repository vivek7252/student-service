apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
  labels:
    app: student-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers:
      - name: student-container
        image: mdeepak05/k8learn-repo:1.0.2
        ports:
        - containerPort: 8080
        env:
          - name: app.message
            value: "student-app-deployment"
          - name: app.value
            value: "k8"